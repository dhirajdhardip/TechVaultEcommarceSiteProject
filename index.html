<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVault - Premium Electronics Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                TechVault
            </div>
            <div class="nav-controls">
                <input type="text" class="search-box" id="searchBox" placeholder="Search curated products...">
                <button class="cart-btn" id="cartBtn">
                    Cart
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Premium Tech.<br>Curated for lifestyle.</h1>
            <p>Discover minimal, high-performance electronics designed to improve your workflow and daily routine.</p>
        </section>

        <div class="controls-wrapper">
            <nav class="filters" aria-label="Product categories">
                <button class="filter-btn active" data-category="all">All Products</button>
                <button class="filter-btn" data-category="smartphones">Smartphones</button>
                <button class="filter-btn" data-category="laptops">Laptops</button>
                <button class="filter-btn" data-category="accessories">Accessories</button>
                <button class="filter-btn" data-category="wearables">Wearables</button>
            </nav>

            <div class="advanced-controls">
                <div class="price-filter-container">
                    <label for="priceRange">Max Price: $<span id="priceValue">2000</span></label>
                    <input type="range" id="priceRange" min="0" max="2000" value="2000" step="50">
                </div>
                <div class="sort-container">
                    <select id="sortSelect" class="sort-dropdown">
                        <option value="default">Sort By: Default</option>
                        <option value="low-high">Price: Low to High</option>
                        <option value="high-low">Price: High to Low</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </main>

    <div class="modal" id="cartModal" aria-hidden="true">
        <div class="modal-content">
            <button class="close-btn" id="closeCart" aria-label="Close Shopping Cart">✕</button>
            <h2>Shopping Cart</h2>
            <div id="cartItemsContainer"></div>
        </div>
    </div>

    <div class="modal" id="productModal" aria-hidden="true">
        <div class="modal-content product-modal-content">
            <button class="close-btn" id="closeProductModal">✕</button>
            <div id="productDetailsContainer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
<hr>
<div class="footer-socials">
    <h3>Stay Connected</h3>
    <div class="social-icons">
        <a href="#" class="social-icon-link" aria-label="Facebook">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
            </svg>
        </a>
        <a href="#" class="social-icon-link" aria-label="X / Twitter">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4l11.733 16h4.267l-11.733 -16z M4 20l6.768 -6.768 M20 4l-6.768 6.768"></path>
            </svg>
        </a>
        <a href="#" class="social-icon-link" aria-label="Instagram">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        </a>
        

</html>
